<html>
<head>
<title>Restaurant Table Reservation</title>
</head>
<body>
<center>
<font color="brown">
<h2>RESTAURANT TABLE RESERVATION</h2>
</font>
</center>
<hr>
<br>
<form>
<table align="centre" cellpadding="8">
<tr>
<td>Customer Name:</td>
<td><input type="text" name="cname"></td>
</tr>
<tr>
<td>Password:</td>
<td><input type="password" name="pwd"></td>
</tr>
<tr>
<td><Phone Number:</td>
<td><input type="text" name="phone"></td>
</tr>
<tr>
<td>Email:</td>
<td><input type="email" name="email"></td>
</tr>
<tr>
<td>Reservation Date:</td>
<td><input type="date" name="date"></td>
</tr>
<tr>
<td>Reservation Time:</td>
<td><input type="time" name="time"></td>
</tr>
<tr>
<td>Table Type:</td>
<td>
<input type="radio" name="table">Indoor
<input type="radio" name="table">Outdoor
</td>
</tr>
<tr>
<td>Meal Preference:</td>
<td>
<input type="checkbox">Veg
<input type="checkbox">Non-veg
<input type="checkbox">Dessert
</td>
</tr>
<tr>
<td>Special Request:</td>
<td>
<textarea rows="4" cols="25"></textarea>
</td>
</tr>
<tr>
<td>Occasion:</td>
<td>
<select name ="Occasion">
<option>Birthday</option>
<option>Anniversary</option>
<option selected>Family Dinner</option>
<option>Business Meeting</option>
</select>
</td>
</tr>
<tr>
<td>Upload ID proof:</td>
<td><input type="file"></td>
</tr>
<tr>
<td colspan="2" align="centre">
<center><input type="submit" value="Reserve">
<input type="reset" value="Reset">
<input type ="button" value="Check Availability"></center>
</td>
</tr>
</form>
</table>
</body>
</html>
